name: Release # 工作流的名称，会在 GitHub Actions 页面显示
on: # 定义触发规则
  workflow_dispatch:
  push: # 当代码被推送时触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Install pnpm # 步骤3：专门安装 pnpm 管理器
        uses: pnpm/action-setup@v4 # 使用社区提供的 pnpm 安装插件

      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          cd ios
          pod install
          cd ..

      - name: Build and Package
        run: |
          cd ios
          # 1. 明确构建路径
          xcodebuild -workspace MyTrollApp.xcworkspace \
                     -scheme MyTrollApp \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     archive -archivePath ./build/MyTrollApp.xcarchive

          # 2. 更加健壮地查找 .app 文件
          # 我们使用 find 命令动态寻找，而不是硬编码目录
          APP_PATH=$(find ./build/MyTrollApp.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "错误：未在构建产物中找到 .app 文件！"
            exit 1
          fi

          echo "找到 App: $APP_PATH"

          # 3. 准备 Payload 目录 (巨魔商店标准格式)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # 4. 打包
          zip -qr MyTrollApp.ipa Payload/

          # 5. 确保 IPA 存在
          if [ -f "MyTrollApp.ipa" ]; then
            echo "IPA 打包成功"
          else
            echo "IPA 打包失败"
            exit 1
          fi

          mkdir -p Payload
          cp -r build/MyTrollApp.xcarchive/Products/Applications/*.app Payload/
          zip -qr MyTrollApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyTrollApp-ipa
          path: ios/MyTrollApp.ipa
