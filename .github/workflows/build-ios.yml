name: Release
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          cd ios
          pod install
          cd ..

      - name: Build and Package
        run: |
          cd ios
          # 1. 编译生成 Archive
          xcodebuild -workspace MyTrollApp.xcworkspace \
                     -scheme MyTrollApp \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     archive -archivePath ./build/MyTrollApp.xcarchive

          # 2. 定位 .app 文件夹
          APP_PATH=$(find ./build/MyTrollApp.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到 .app 文件"
            exit 1
          fi

          # 3. 安装 ldid 并进行重签名 (修复 301 错误的关键)
          brew install ldid
          echo "正在对二进制文件进行重签名..."
          # 这一步会自动补全 _CodeSignature 目录并修正二进制权限
          find "$APP_PATH" -name "*.framework" -o -name "*.dylib" | xargs ldid -S || true
          ldid -S "$APP_PATH/MyTrollApp"

          # 4. 制作 Payload 目录
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # 5. 打包 IPA
          zip -qr MyTrollApp.ipa Payload/

          if [ -f "MyTrollApp.ipa" ]; then
            echo "IPA 打包成功，已注入签名信息"
          else
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyTrollApp-ipa
          path: ios/MyTrollApp.ipa
