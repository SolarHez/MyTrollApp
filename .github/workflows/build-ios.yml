name: Release
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          cd ios
          pod install
          cd ..

      - name: Build and Package
        run: |
          cd ios
          # 1. 编译 (确保不生成任何签名校验信息)
          xcodebuild -workspace MyTrollApp.xcworkspace \
                     -scheme MyTrollApp \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     archive -archivePath ./build/MyTrollApp.xcarchive

          # 2. 定位 .app
          APP_DIR=$(find ./build -name "*.app" -type d | head -n 1)

          # 3. 强行修复结构 (关键：确保 info.plist 没有错误依赖)
          # 这一步是为了防止某些项目遗留了错误的签名 ID
          /usr/libexec/PlistBuddy -c "Delete :CFBundleResourceSpecification" "$APP_DIR/Info.plist" || true

          # 4. 使用 ldid 全局覆盖重签
          brew install ldid
          echo "进行全局重签..."
          # 清除现有的签名目录，防止冲突
          rm -rf "$APP_DIR/_CodeSignature"
          # 对整个目录进行深度重签
          find "$APP_DIR" -name "*.framework" -o -name "*.dylib" -o -name "$(basename "$APP_DIR" .app)" | xargs ldid -S

          # 5. 打包
          mkdir -p Payload
          cp -r "$APP_DIR" Payload/
          zip -qr MyTrollApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyTrollApp-ipa
          path: ios/MyTrollApp.ipa
